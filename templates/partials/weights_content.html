<section>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Weight Log</h1>
    <button onclick="MaxMode.openWeightModal()"
            class="flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primary-hover active:bg-primary-active text-white dark:text-gray-900 text-sm font-semibold rounded-xl transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Log Weight
    </button>
  </div>

  <!-- Weight Modal -->
  <div id="weight-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/80 backdrop-blur-sm">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 mx-4 max-w-sm w-full">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">Log Weight</h2>
        <button onclick="MaxMode.closeWeightModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form onsubmit="MaxMode.handleWeightSubmit(event)">
        <label for="weight-input" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Weight (kg)</label>
        <input type="number" id="weight-input" step="0.1" min="0.1" max="999"
               class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-shadow text-2xl font-bold text-center"
               placeholder="0.0" required autofocus>
        <button type="submit"
                class="w-full mt-4 py-3 bg-primary hover:bg-primary-hover active:bg-primary-active text-white dark:text-gray-900 font-semibold rounded-xl transition-colors">
          Save
        </button>
      </form>
    </div>
  </div>

  <!-- Empty State -->
  <div id="weight-empty-state" class="hidden text-center py-16">
    <svg class="w-16 h-16 mx-auto text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
    </svg>
    <p class="text-gray-500 dark:text-gray-400 font-medium">No weight entries yet</p>
    <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">Click "Log Weight" to add your first entry</p>
  </div>

  <!-- Weight Table -->
  <div id="weight-table-container" class="hidden">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
      <table class="w-full">
        <thead>
          <tr class="border-b border-gray-200 dark:border-gray-700">
            <th class="text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide px-4 py-3">Date</th>
            <th class="text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide px-4 py-3">Time</th>
            <th class="text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide px-4 py-3">Weight</th>
          </tr>
        </thead>
        <tbody id="weight-table-body">
        </tbody>
      </table>
    </div>
  </div>
</section>
