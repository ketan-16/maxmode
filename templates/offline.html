<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MaxMode</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 2rem;
      background: #f9fafb; color: #111827;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #f9fafb; }
      .card { background: #1f2937; border-color: #374151; }
      .btn { background: #f0f0f0; color: #111827; }
      .btn:hover { background: #d4d4d4; }
    }
    .card {
      text-align: center; padding: 3rem 2rem; max-width: 24rem; width: 100%;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 1rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #6b7280; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn {
      display: inline-block; padding: 0.75rem 1.5rem;
      background: #1a1a1a; color: #fff; border: none; border-radius: 0.75rem;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #333333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again.</p>
    <button class="btn" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
