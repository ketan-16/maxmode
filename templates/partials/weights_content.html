<section class="app-section">
  <div class="app-section-header">
    <h1 class="apple-title apple-title-no-margin">Weight Log</h1>
    <button onclick="MaxMode.openWeightModal()"
            class="apple-btn apple-btn-primary apple-btn-compact apple-btn-with-icon">
      <svg class="apple-icon apple-icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Log Weight
    </button>
  </div>

  <!-- Weight Modal -->
  <div id="weight-modal" class="hidden app-overlay app-overlay-weight" aria-hidden="true">
    <div class="apple-modal apple-modal-weight" role="dialog" aria-modal="true" aria-labelledby="weight-modal-title">
      <div class="apple-modal-header">
        <h2 id="weight-modal-title" class="apple-subtitle apple-subtitle-no-margin">Log Weight</h2>
        <button type="button" onclick="MaxMode.closeWeightModal()" class="apple-icon-btn">
          <svg class="apple-icon apple-icon-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form class="apple-form" onsubmit="MaxMode.handleWeightSubmit(event)">
        <label for="weight-input" class="apple-field-label">Weight (kg)</label>
        <input type="number" id="weight-input" step="0.1" min="0.1" max="999"
               class="apple-input apple-input-metric"
               placeholder="0.0" required autofocus>
        <button type="submit"
                class="apple-btn apple-btn-primary apple-btn-block">
          <span id="weight-submit-label">Save</span>
        </button>
      </form>
    </div>
  </div>

  <!-- Mobile Weight List -->
  <div id="weight-mobile-list-container" class="hidden weight-mobile-container">
    <div id="weight-mobile-list" class="weight-mobile-list"></div>
  </div>

  <!-- Empty State -->
  <div id="weight-empty-state" class="hidden apple-empty-state">
    <svg class="apple-empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
    </svg>
    <p class="apple-subtitle apple-subtitle-sm">No weight entries yet</p>
    <p class="apple-caption">Click "Log Weight" to add your first entry</p>
  </div>

  <!-- Weight Table -->
  <div id="weight-table-container" class="hidden">
    <div class="apple-card apple-table-card">
      <table class="apple-table">
        <thead>
          <tr class="apple-table-head-row">
            <th class="apple-table-head-cell">Date</th>
            <th class="apple-table-head-cell">Time</th>
            <th class="apple-table-head-cell apple-table-head-cell-right">Weight</th>
            <th class="apple-table-head-cell apple-table-head-cell-right">Actions</th>
          </tr>
        </thead>
        <tbody id="weight-table-body" class="apple-table-body">
        </tbody>
      </table>
    </div>
  </div>

  <!-- Delete Confirmation Sheet -->
  <div id="weight-delete-sheet" class="weight-delete-sheet hidden" aria-hidden="true">
    <div class="weight-delete-sheet-backdrop" data-weight-delete-dismiss></div>
    <div class="weight-delete-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="weight-delete-title">
      <h3 id="weight-delete-title" class="apple-subtitle apple-subtitle-no-margin">Delete this entry?</h3>
      <p class="apple-caption apple-caption-tight">This action cannot be undone.</p>
      <div class="apple-stack-sm">
        <button type="button"
                class="weight-sheet-btn weight-sheet-btn-danger apple-btn apple-btn-destructive"
                data-weight-delete-confirm>
          Delete Entry
        </button>
        <button type="button"
                class="weight-sheet-btn weight-sheet-btn-neutral apple-btn apple-btn-neutral"
                data-weight-delete-dismiss>
          Cancel
        </button>
      </div>
    </div>
  </div>
</section>
